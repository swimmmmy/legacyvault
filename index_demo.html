<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegacyVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Barlow+Condensed:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; min-height: 100%; background: #0d1a12; }
        body { overflow-x: hidden; color: #fff; }
        button { font: inherit; }

        .bg { position: fixed; inset: 0; z-index: 0; }
        .bg-photo { width: 100%; height: 100%; object-fit: cover; object-position: center 40%; filter: contrast(1.15) saturate(0.75) brightness(0.78) sepia(0.18); }
        .bg-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,22,14,.45) 0%, rgba(8,18,10,.1) 40%, rgba(6,14,8,.55) 100%); }
        .bg-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: linear-gradient(to top, rgba(8,18,10,.7) 0%, transparent 100%); }

        .friends-text { position: fixed; z-index: 10; top: 8%; left: 50%; transform: translateX(-30%); width: clamp(17.5rem, 40vw, 35rem); display: flex; flex-direction: column; }
        .friends-line { display: block; font-family: 'Caveat', cursive; font-weight: 600; font-size: clamp(1.25rem, 2.2vw, 1.9rem); color: #F5C842; line-height: 1; letter-spacing: .02em; text-shadow: 0 0.0625rem 0.625rem rgba(0,0,0,.6); white-space: nowrap; opacity: 0; }
        .friends-line:nth-child(1) { padding-left: 20%; margin-bottom: .85em; animation: fIn .5s ease .2s forwards }
        .friends-line:nth-child(2) { padding-left: 14%; margin-bottom: .85em; animation: fIn .5s ease .55s forwards }
        .friends-line:nth-child(3) { padding-left: 28%; margin-bottom: .85em; animation: fIn .5s ease .9s forwards }
        .friends-line:nth-child(4) { padding-left: 5%; margin-bottom: .85em; animation: fIn .5s ease 1.25s forwards }
        .friends-line:nth-child(5) { padding-left: 28%; margin-bottom: .85em; animation: fIn .5s ease 1.6s forwards }
        .friends-line:nth-child(6) { padding-left: 14%; animation: fIn .5s ease 1.95s forwards }
        @keyframes fIn { from { opacity: 0; transform: translateY(0.3125rem) } to { opacity: 1; transform: translateY(0) } }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 20; padding: 1.75rem 2.5rem; }
        .nav-brand { font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.1rem; color: rgba(255,255,255,.9); text-shadow: 0 0.0625rem 0.5rem rgba(0,0,0,.5); line-height: 1; margin-bottom: .25rem; }
        .nav-sub { font-family: 'Caveat', cursive; font-size: .85rem; font-weight: 500; color: rgba(255,255,255,.4); }

        .mm-wrap { position: fixed; z-index: 20; bottom: 3rem; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 1rem; opacity: 0; animation: fIn .8s ease 2.6s forwards; }

        .timer-wrap { position: fixed; z-index: 15; left: 0; right: 0; bottom: 14rem; display: none; opacity: 0; text-align: center; }
        .timer-wrap.visible { display: flex; justify-content: center; animation: fIn .6s ease forwards; }
        .timer-box { font-family: 'Caveat', cursive; color: #F5C842; text-shadow: 0 0 0.9375rem rgba(245,200,66,.4); display: flex; flex-direction: column; align-items: center; text-align: center; }
        .timer-state { font-size: clamp(.8rem, 1vw, .95rem); font-family: Arial, sans-serif; font-weight: 700; letter-spacing: .18em; margin-bottom: .4rem; }
        #timer-display { font-size: clamp(2.4rem, 4.4vw, 4.5rem); font-weight: 700; line-height: .95; }
        .timer-date { margin-top: .65rem; color: #E6D115; font-family: Arial, sans-serif; font-size: .76rem; letter-spacing: .05em; }

        .mm-btn { display: inline-flex; align-items: center; gap: .625rem; background: rgba(255,140,0,.15); border: .0625rem solid rgba(255,140,0,.45); backdrop-filter: blur(.75rem); color: #F5C842; padding: .8125rem 2rem; border-radius: 3.125rem; font-family: 'Caveat', cursive; font-weight: 700; font-size: 1.05rem; letter-spacing: .04em; cursor: pointer; transition: all .25s ease; white-space: nowrap; }
        .mm-btn:hover { background: rgba(255,140,0,.25); border-color: rgba(255,140,0,.7); transform: translateY(-.125rem); }
        .mm-btn:focus-visible, .status-item:focus-visible, .sheet-close:focus-visible { outline: .125rem solid #fff; outline-offset: .25rem; }
        .mm-btn.connected { background: rgba(245,200,66,.12); border-color: rgba(245,200,66,.35); color: #F5C842; font-family: monospace; font-size: .82rem; letter-spacing: 0; cursor: default; }
        .mm-btn.connected:hover { transform: none; }
        .checkin-copy { color: rgba(255,255,255,.58); font-family: Arial, sans-serif; font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; }

        .heartbeat { position: fixed; bottom: 13rem; left: 0; width: 100%; height: 6.25rem; z-index: 5; overflow: hidden; background: transparent; pointer-events: none; --cursor-x: 50%; --cursor-y: 50%; --heartbeat-opacity: .72; transition: filter .3s ease; }
        .heartbeat::after { content: ''; position: absolute; left: var(--cursor-x); top: var(--cursor-y); width: 5rem; height: 5rem; border-radius: 50%; background: radial-gradient(circle, rgba(245,200,66,.16), transparent 68%); opacity: 0; transform: translate(-50%,-50%) scale(.7); transition: opacity .25s ease, transform .25s ease; }
        .heartbeat.is-interactive::after { opacity: 1; transform: translate(-50%,-50%) scale(1); }
        .heartbeat.is-interactive .heartbeat-line { opacity: 1; filter: drop-shadow(0 0 .2rem rgba(245,200,66,.55)); }
        .heartbeat.confirmed .heartbeat-line { animation: heartbeat-confirm .9s ease-out; stroke-width: 2; }
        .heartbeat.confirmed .heartbeat-echo { animation: heartbeat-echo .9s ease-out; }
        @keyframes heartbeat-confirm { 0%{opacity:.2;stroke-dashoffset:1} 35%{opacity:1;stroke-dashoffset:.25} 55%{opacity:.55;stroke-dashoffset:.1} 72%{opacity:1;stroke-dashoffset:-.25} 100%{opacity:.2;stroke-dashoffset:-1} }
        @keyframes heartbeat-echo { 0%,32%{opacity:0;stroke-dashoffset:1} 58%{opacity:.32;stroke-dashoffset:.15} 100%{opacity:0;stroke-dashoffset:-1} }

        .status-bar { position: fixed; z-index: 20; right: 2rem; top: .85rem; display: flex; align-items: center; justify-content: flex-end; opacity: 0; visibility: hidden; transition: opacity .6s ease; }
        .status-item { appearance: none; border: 0; border-right: .0625rem solid rgba(255,255,255,.2); padding: .25rem 1.1rem; background: transparent; color: rgba(255,255,255,.72); font-family: Arial, sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .1em; cursor: pointer; white-space: nowrap; }
        .status-item:last-child { border-right: 0; }
        .status-item:hover { color: #F5C842; }
        .status-item.state-safe { color: #F5C842; }

        /* Bottom sheet */
        .bottom-sheet { position: fixed; z-index: 40; inset: 0; display: flex; align-items: flex-end; justify-content: center; background: rgba(2,8,4,.62); opacity: 0; visibility: hidden; transition: opacity .25s ease, visibility .25s ease; }
        .bottom-sheet.open { opacity: 1; visibility: visible; }
        .sheet-panel { width: min(100%, 44rem); max-height: 85vh; overflow-y: auto; padding: 1.5rem 1.5rem 2rem; border: .0625rem solid rgba(245,200,66,.25); border-bottom: 0; border-radius: 1.5rem 1.5rem 0 0; background: rgba(9,22,13,.96); backdrop-filter: blur(1.25rem); transform: translateY(100%); transition: transform .3s ease; }
        .bottom-sheet.open .sheet-panel { transform: translateY(0); }
        .sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
        .sheet-title { color: #F5C842; font-family: 'Caveat', cursive; font-size: 1.7rem; }
        .sheet-close { width: 2.25rem; height: 2.25rem; border: .0625rem solid rgba(255,255,255,.18); border-radius: 50%; background: transparent; color: #fff; cursor: pointer; flex-shrink: 0; }
        .sheet-content { color: rgba(255,255,255,.75); font-family: Arial, sans-serif; font-size: .88rem; line-height: 1.7; }
        .sheet-row { display: flex; justify-content: space-between; gap: 1rem; padding: .8rem 0; border-bottom: .0625rem solid rgba(255,255,255,.08); }
        .sheet-row strong { color: #fff; text-align: right; }

        /* Will / Letters section labels */
        .section-label { color: rgba(255,255,255,.45); font-size: .7rem; letter-spacing: .1em; font-family: Arial, sans-serif; text-transform: uppercase; margin-bottom: .5rem; margin-top: 1.2rem; }
        .will-textarea { width: 100%; background: rgba(255,255,255,.05); border: 1px solid rgba(245,200,66,.2); border-radius: .5rem; padding: .65rem .8rem; color: #fff; font-family: 'Caveat', cursive; font-size: 1rem; line-height: 1.5; resize: vertical; min-height: 4.5rem; outline: none; transition: border-color .2s; }
        .will-textarea:focus { border-color: rgba(245,200,66,.5); }
        .will-textarea::placeholder { color: rgba(255,255,255,.25); }
        .will-save-btn { margin-top: 1rem; width: 100%; padding: .7rem; border-radius: .5rem; border: none; background: rgba(245,200,66,.18); color: #F5C842; font-family: Arial, sans-serif; font-weight: 700; font-size: .82rem; letter-spacing: .08em; cursor: pointer; transition: background .2s; }
        .will-save-btn:hover { background: rgba(245,200,66,.28); }
        .will-status { margin-top: .5rem; font-size: .75rem; color: rgba(255,255,255,.4); text-align: center; font-family: Arial, sans-serif; }

        /* Heir cards for multi-beneficiary */
        .heir-rows { display: flex; flex-direction: column; gap: .6rem; margin-bottom: .5rem; }
        .heir-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: .55rem; padding: .65rem .75rem; display: flex; flex-direction: column; gap: .45rem; }
        .heir-card-row1 { display: flex; gap: .45rem; align-items: center; }
        .heir-card-row2 { display: flex; gap: .45rem; align-items: center; }
        .heir-card input[type="text"], .heir-card input[type="number"] { background: rgba(255,255,255,.05); border: 1px solid rgba(245,200,66,.18); border-radius: .35rem; padding: .4rem .55rem; color: #fff; font-size: .78rem; outline: none; min-width: 0; }
        .heir-card input[type="text"]:focus, .heir-card input[type="number"]:focus { border-color: rgba(245,200,66,.45); }
        .heir-card select { background: rgba(255,255,255,.05); border: 1px solid rgba(245,200,66,.18); border-radius: .35rem; padding: .4rem .5rem; color: rgba(255,255,255,.8); font-family: Arial, sans-serif; font-size: .75rem; outline: none; cursor: pointer; }
        .heir-card select option { background: #1a2e1e; }
        .heir-pct-input { width: 3.2rem !important; text-align: center; color: #F5C842 !important; font-weight: 700; }
        .pct-unit { color: rgba(255,255,255,.35); font-size: .72rem; font-family: Arial, sans-serif; flex-shrink: 0; }
        .remove-heir { width: 1.4rem; height: 1.4rem; border: 1px solid rgba(255,255,255,.18); border-radius: 50%; background: transparent; color: rgba(255,255,255,.35); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; line-height: 1; }
        .remove-heir:hover { color: #ff5c5c; border-color: #ff5c5c; }
        .add-heir-btn { font-size: .75rem; color: rgba(245,200,66,.6); background: transparent; border: 1px dashed rgba(245,200,66,.3); border-radius: .4rem; padding: .35rem .7rem; cursor: pointer; font-family: Arial, sans-serif; transition: all .2s; }
        .add-heir-btn:hover { color: #F5C842; border-color: rgba(245,200,66,.6); }
        .pct-total { font-size: .72rem; font-family: Arial, sans-serif; color: rgba(255,255,255,.4); text-align: right; margin-top: .25rem; }
        .pct-total.warn { color: #ff9f43; }
        .pct-total.ok { color: #5fc87a; }

        /* Letters / ghost messages */
        .letter-list { display: flex; flex-direction: column; gap: .75rem; margin-bottom: .75rem; }
        .letter-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: .6rem; padding: .75rem .9rem; }
        .letter-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
        .letter-card-to { color: #F5C842; font-family: 'Caveat', cursive; font-size: 1.05rem; }
        .letter-card-date { color: rgba(255,255,255,.4); font-size: .7rem; font-family: Arial, sans-serif; }
        .letter-card-preview { color: rgba(255,255,255,.55); font-size: .8rem; font-family: Arial, sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .letter-card-actions { display: flex; gap: .4rem; margin-top: .5rem; }
        .letter-action-btn { font-size: .7rem; font-family: Arial, sans-serif; padding: .25rem .6rem; border-radius: .3rem; border: 1px solid rgba(255,255,255,.15); background: transparent; color: rgba(255,255,255,.5); cursor: pointer; }
        .letter-action-btn:hover { color: #fff; border-color: rgba(255,255,255,.4); }
        .letter-action-btn.del:hover { color: #ff5c5c; border-color: #ff5c5c; }

        /* New letter form */
        .new-letter-form { background: rgba(245,200,66,.04); border: 1px solid rgba(245,200,66,.15); border-radius: .7rem; padding: .9rem; }
        .new-letter-form .form-row { display: flex; gap: .5rem; margin-bottom: .5rem; }
        .new-letter-form input { flex: 1; background: rgba(255,255,255,.05); border: 1px solid rgba(245,200,66,.2); border-radius: .4rem; padding: .5rem .7rem; color: #fff; font-family: Arial, sans-serif; font-size: .82rem; outline: none; min-width: 0; }
        .new-letter-form input::placeholder { color: rgba(255,255,255,.25); }

        /* State colours */
        body.state-warning .timer-box, body.state-warning .status-item.state-safe { color: #ff9f43; }
        body.state-pending .timer-box, body.state-pending .status-item.state-safe { color: #ff5c5c; }
        body.state-released .timer-box, body.state-released .status-item.state-safe { color: #a7aca9; }

        .heartbeat svg { display: block; width: 100%; height: 100%; }
        .heartbeat-line { fill: none; stroke: #F5C842; stroke-width: 1.35; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; stroke-dasharray: 1; stroke-dashoffset: 1; opacity: var(--heartbeat-opacity); filter: drop-shadow(0 0 .12rem rgba(245,200,66,.42)); animation: heartbeat-draw 1.8s linear infinite; transition: opacity .25s ease, filter .25s ease, stroke .25s ease; }
        .heartbeat-echo { fill: none; stroke: #F5C842; stroke-width: .8; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; opacity: .13; transform: translateY(2px); }
        @keyframes heartbeat-draw { 0%{stroke-dashoffset:1;opacity:0} 10%{opacity:1} 75%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-1;opacity:0} }

        @media (max-width: 48rem) {
            .friends-text { position: relative; top: auto; left: auto; transform: none; width: 100%; min-height: 100svh; padding: 5.5rem 1rem 15rem; }
            .friends-line { font-size: clamp(1rem, 5vw, 1.5rem); white-space: normal; text-align: center; }
            .friends-line:nth-child(n) { padding-left: 0; margin-bottom: .5rem; }
            #timer-display { font-size: 2.75rem; }
            nav { padding: 1rem; }
            .mm-wrap { bottom: 4.2rem; }
            .mm-btn { padding: .6rem 1.5rem; font-size: .9rem; }
            .heartbeat { bottom: 11rem; height: 4.5rem; }
            .status-bar { bottom: .65rem; right: 0; width: 100%; }
            .status-item { flex: 1; padding: .35rem .15rem; font-size: .52rem; letter-spacing: .03em; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
            .heartbeat-line { animation: none; stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>

<div class="friends-text">
    <span class="friends-line">One day</span>
    <span class="friends-line">someone will need</span>
    <span class="friends-line">your password.</span>
    <span class="friends-line">You'll leave eventually.</span>
    <span class="friends-line">Your assets</span>
    <span class="friends-line">shouldn't get lost.</span>
</div>

<div class="timer-wrap">
    <div class="timer-box">
        <span class="timer-state" id="timer-state">YOU'RE STILL WITH US</span>
        <span id="timer-display" aria-live="polite"></span>
        <span class="timer-date" id="timer-date"></span>
    </div>
</div>

<div class="heartbeat" role="img" aria-label="heartbeat">
    <svg viewBox="0 0 600 100" preserveAspectRatio="none">
        <path class="heartbeat-line" pathLength="1" d="M 0 50 H 200 L 235 50 L 250 25 L 265 78 L 285 8 L 305 88 L 325 50 H 600"/>
        <path class="heartbeat-echo" pathLength="1" d="M 0 50 H 200 L 235 50 L 250 25 L 265 78 L 285 8 L 305 88 L 325 50 H 600"/>
    </svg>
</div>

<div class="bg">
    <img class="bg-photo" src="friends.jpg" alt="" onerror="this.style.display='none';document.getElementById('bf').style.display='block';">
    <div id="bf" style="display:none;position:absolute;inset:0;background:linear-gradient(135deg,#0a1a0e,#1b3a22);"></div>
    <div class="bg-overlay"></div>
    <div class="bg-fade"></div>
</div>

<nav>
    <div class="nav-brand">LegacyVault</div>
    <div class="nav-sub">made by SWIMMMMY</div>
</nav>

<div class="mm-wrap">
    <button class="mm-btn" id="mm-btn" onclick="connectWallet()">
        <svg viewBox="0 0 36 36" style="width:1.25rem;height:1.25rem;flex-shrink:0">
            <path d="M32.9 1L20.2 10.3l2.3-5.5L32.9 1z" fill="#F5C842"/>
            <path d="M3.1 1l12.6 9.4-2.2-5.6L3.1 1z" fill="#F5C842"/>
            <path d="M28.2 25.6l-3.4 5.2 7.3 2 2.1-7.1-6-.1z" fill="#F5C842"/>
            <path d="M1.8 25.7l2 7.1 7.3-2-3.4-5.2-5.9.1z" fill="#F5C842"/>
            <path d="M10.7 16l-2 3 7.1.3-.2-7.7-4.9 4.4z" fill="#F5C842"/>
            <path d="M25.3 16l-5-4.5-.2 7.8 7.1-.3-1.9-3z" fill="#F5C842"/>
            <path d="M11.1 30.8l4.3-2.1-3.7-2.9-.6 5z" fill="#F5C842"/>
            <path d="M20.6 28.7l4.3 2.1-.6-5-3.7 2.9z" fill="#F5C842"/>
        </svg>
        CONNECT TO BEGIN
    </button>
    <span class="checkin-copy" id="checkin-copy">MetaMask connection required</span>
</div>

<div class="status-bar" aria-label="Vault status">
    <button class="status-item" type="button" data-sheet="assets">ASSETS</button>
    <button class="status-item" type="button" data-sheet="beneficiaries">BENEFICIARIES</button>
    <button class="status-item state-safe" type="button" data-sheet="protection">PROTECTED</button>
    <button class="status-item" type="button" data-sheet="letters">LETTERS</button>
    <button class="status-item" type="button" data-sheet="about">ABOUT</button>
</div>

<div class="bottom-sheet" id="bottom-sheet" aria-hidden="true">
    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
        <div class="sheet-header">
            <h2 class="sheet-title" id="sheet-title"></h2>
            <button class="sheet-close" id="sheet-close" type="button" aria-label="Close">×</button>
        </div>
        <div class="sheet-content" id="sheet-content"></div>
    </section>
</div>

<script>
const CONTRACT_ADDRESS = '0xBDB98082fC0C1ba918FD7460ECf96BF46A3abEAe';
const CONTRACT_ABI = [
    {"inputs":[{"internalType":"address payable","name":"_heir","type":"address"}],"stateMutability":"payable","type":"constructor"},
    {"inputs":[],"name":"heartbeat","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"release","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"getStatus","outputs":[{"internalType":"uint256","name":"balance","type":"uint256"},{"internalType":"uint256","name":"timeLeft","type":"uint256"},{"internalType":"bool","name":"isReleased","type":"bool"},{"internalType":"bool","name":"inGrace","type":"bool"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"owner","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"heir","outputs":[{"internalType":"address payable","name":"","type":"address"}],"stateMutability":"view","type":"function"},
    {"stateMutability":"payable","type":"receive"}
];

let contract = null, contractReadOnly = null, userAddress = null, pollInterval = null;
const connectButtonMarkup = document.getElementById('mm-btn').innerHTML;

/* ── localStorage keys ─────────────────────────── */
const WILL_KEY  = 'lv_will_v2';
const HEIRS_KEY = 'lv_heirs_v2';
const LTRS_KEY  = 'lv_letters_v2';

/* ── Will helpers ──────────────────────────────── */
function loadWill() {
    try { return JSON.parse(localStorage.getItem(WILL_KEY)) || {}; } catch { return {}; }
}
function saveWill(data) { localStorage.setItem(WILL_KEY, JSON.stringify(data)); }

/* ── Heirs helpers (multi %) ───────────────────── */
function loadHeirs() {
    try { return JSON.parse(localStorage.getItem(HEIRS_KEY)) || [{ name: '', wallet: '', pct: 100, timing: 'immediately', timingVal: '', timingCustom: '' }]; }
    catch { return [{ name: '', wallet: '', pct: 100, timing: 'immediately', timingVal: '', timingCustom: '' }]; }
}
function saveHeirs(heirs) { localStorage.setItem(HEIRS_KEY, JSON.stringify(heirs)); }

/* ── Letters helpers ───────────────────────────── */
function loadLetters() {
    try { return JSON.parse(localStorage.getItem(LTRS_KEY)) || []; } catch { return []; }
}
function saveLetters(letters) { localStorage.setItem(LTRS_KEY, JSON.stringify(letters)); }

/* ── Sheet data ────────────────────────────────── */
const sheetData = {
    assets: { title: 'Your Assets', content: '' },
    protection: {
        title: 'Protection Status',
        content: `
        <div class="sheet-row"><span>Heartbeat window</span><strong>60 seconds</strong></div>
        <div class="sheet-row"><span>Grace period</span><strong>10 seconds</strong></div>
        <div class="sheet-row"><span>Transfer status</span><strong id="sheet-transfer-state">Not scheduled</strong></div>`
    },
    about: {
        title: 'About LegacyVault',
        content: `
        <div class="sheet-row"><span>서비스</span><strong>블록체인 기반 디지털 유산 관리</strong></div>

        <div class="sheet-row"><span>제작자</span><strong>SWIMMMMY</strong></div>`
    }

/* ── Build a single heir card ──────────────────── */
function buildHeirCard(h, i) {
    const t = h.timing || 'immediately';
    const opts = [
        ['immediately', 'Immediately'],
        ['years',       'After N years'],
        ['age',         'When age N'],
        ['custom',      'Custom condition']
    ].map(([v, l]) => `<option value="${v}"${t===v?' selected':''}>${l}</option>`).join('');
    const showN      = t === 'years' || t === 'age';
    const showCustom = t === 'custom';
    const nLabel     = t === 'years' ? 'yrs' : 'age';
    return `<div class="heir-card" id="heir-row-${i}">
        <div class="heir-card-row1">
            <input type="text" placeholder="Name" value="${h.name||''}"
                oninput="updateHeirField(${i},'name',this.value)" style="flex:1">
            <input type="text" placeholder="0x wallet address" value="${h.wallet||''}"
                oninput="updateHeirField(${i},'wallet',this.value)" style="flex:2;font-family:monospace;font-size:.7rem">
            <input type="number" class="heir-pct-input" min="0" max="100" value="${h.pct??''}" placeholder="%"
                oninput="updateHeirField(${i},'pct',+this.value)">
            <span class="pct-unit">%</span>
            <button class="remove-heir" onclick="removeHeirRow(${i})">×</button>
        </div>
        <div class="heir-card-row2">
            <span style="color:rgba(255,255,255,.4);font-size:.72rem;font-family:Arial;flex-shrink:0">Transfer</span>
            <select onchange="updateHeirTiming(${i},this.value)">${opts}</select>
            ${showN ? `<input type="number" min="0" placeholder="${nLabel}" value="${h.timingVal||''}"
                oninput="updateHeirField(${i},'timingVal',+this.value)"
                style="width:4rem">` : ''}
            ${showCustom ? `<input type="text" placeholder="e.g. when she turns 25" value="${h.timingCustom||''}"
                oninput="updateHeirField(${i},'timingCustom',this.value)"
                style="flex:1">` : ''}
        </div>
    </div>`;
}

/* ── Build beneficiaries sheet HTML ────────────── */
function buildBeneficiariesContent(heirAddr, balPOL) {
    const will  = loadWill();
    const heirs = loadHeirs();
    const heirRowsHTML = heirs.map((h, i) => buildHeirCard(h, i)).join('');
    const total = heirs.reduce((s, h) => s + (Number(h.pct) || 0), 0);
    const totalColor = total === 100 ? 'ok' : 'warn';
    const totalText  = total === 100 ? '✓ Total 100%' : `Total ${total}% — must equal 100`;

    return `
    <div class="sheet-row"><span>Current heir (on-chain)</span><strong style="font-size:.72rem;word-break:break-all">${heirAddr}</strong></div>
    <div class="sheet-row"><span>Locked amount</span><strong style="color:#F5C842">${balPOL} POL</strong></div>

    <div class="section-label" style="margin-top:1.4rem">Last Will &amp; Testament</div>

    <div class="section-label" style="margin-top:.8rem">Asset Distribution</div>
    <div class="heir-rows" id="heir-rows">${heirRowsHTML}</div>
    <button class="add-heir-btn" onclick="addHeirRow()">+ Add Beneficiary</button>
    <div class="pct-total ${totalColor}" id="pct-total">${totalText}</div>

    <div class="section-label" style="margin-top:1rem">Message to Beneficiaries</div>
    <textarea class="will-textarea" id="will-msg">${will.msg || ''}</textarea>

    <button class="will-save-btn" onclick="saveWillData()">Save</button>
    <div class="will-status" id="will-status"></div>`;
}

/* ── Build letters sheet HTML ──────────────────── */
function buildLettersContent() {
    const letters = loadLetters();
    const listHTML = letters.length ? letters.map((l, i) => `
        <div class="letter-card">
            <div class="letter-card-header">
                <span class="letter-card-to">To. ${l.to || '—'}</span>
                <span class="letter-card-date">${l.date ? '📅 ' + l.date : 'No date set'}</span>
            </div>
            <div class="letter-card-preview">${l.body || ''}</div>
            <div class="letter-card-actions">
                <button class="letter-action-btn" onclick="editLetter(${i})">Edit</button>
                <button class="letter-action-btn del" onclick="deleteLetter(${i})">Delete</button>
            </div>
        </div>`).join('') : `<p style="color:rgba(255,255,255,.3);font-size:.85rem;text-align:center;padding:1.2rem 0">No letters yet.</p>`;

    return `
    <p style="color:rgba(255,255,255,.4);font-size:.8rem;margin-bottom:1rem;line-height:1.6">Messages to be delivered to specific people on a chosen date after you're gone.</p>
    <div class="letter-list">${listHTML}</div>

    <div class="section-label">New Letter</div>
    <div class="new-letter-form">
        <div class="form-row">
            <input type="text" id="letter-to" placeholder="To (name or relationship)" style="flex:1.2">
            <input type="date" id="letter-date" style="flex:1;color-scheme:dark">
        </div>
        <textarea class="will-textarea" id="letter-body" style="min-height:6rem"></textarea>
        <button class="will-save-btn" onclick="saveLetter()">Save Letter</button>
        <div class="will-status" id="letter-status"></div>
    </div>`;
}

/* ── Heir row mutations ────────────────────────── */
function refreshPctTotal() {
    const heirs = loadHeirs();
    const total = heirs.reduce((s, h) => s + (Number(h.pct) || 0), 0);
    const el = document.getElementById('pct-total');
    if (el) { el.className = 'pct-total ' + (total === 100 ? 'ok' : 'warn'); el.textContent = total === 100 ? '✓ Total 100%' : `Total ${total}% — must equal 100`; }
}

window.updateHeirField = function(i, field, val) {
    const heirs = loadHeirs(); heirs[i][field] = val; saveHeirs(heirs); refreshPctTotal();
};

window.updateHeirTiming = function(i, val) {
    const heirs = loadHeirs(); heirs[i].timing = val; saveHeirs(heirs);
    // re-render just that card
    const card = document.getElementById(`heir-row-${i}`);
    if (card) { const tmp = document.createElement('div'); tmp.innerHTML = buildHeirCard(heirs[i], i); card.replaceWith(tmp.firstChild); }
};

window.addHeirRow = function() {
    const heirs = loadHeirs();
    heirs.push({ name: '', wallet: '', pct: 0, timing: 'immediately', timingVal: '', timingCustom: '' });
    saveHeirs(heirs);
    const container = document.getElementById('heir-rows');
    if (!container) return;
    const i = heirs.length - 1;
    const tmp = document.createElement('div'); tmp.innerHTML = buildHeirCard(heirs[i], i);
    container.appendChild(tmp.firstChild);
    refreshPctTotal();
};

window.removeHeirRow = function(i) {
    const heirs = loadHeirs();
    if (heirs.length <= 1) return;
    heirs.splice(i, 1); saveHeirs(heirs);
    const container = document.getElementById('heir-rows');
    if (container) { container.innerHTML = heirs.map((h, idx) => buildHeirCard(h, idx)).join(''); }
    refreshPctTotal();
};

/* ── Will save ─────────────────────────────────── */
window.saveWillData = function() {
    const msg = document.getElementById('will-msg')?.value || '';
    saveWill({ msg, savedAt: new Date().toISOString() });
    const el = document.getElementById('will-status');
    if (el) { el.textContent = '✓ Saved'; el.style.color = '#F5C842'; setTimeout(() => { el.textContent = ''; }, 2000); }
};

/* ── Letter save/edit/delete ───────────────────── */
window.saveLetter = function() {
    const to   = document.getElementById('letter-to')?.value.trim()   || '';
    const date = document.getElementById('letter-date')?.value         || '';
    const body = document.getElementById('letter-body')?.value.trim()  || '';
    if (!body) { const s = document.getElementById('letter-status'); if (s) { s.textContent = 'Write something first.'; s.style.color='#ff5c5c'; } return; }
    const letters = loadLetters();
    const editIdx = window._editingLetterIdx;
    if (editIdx !== undefined) {
        letters[editIdx] = { to, date, body };
        delete window._editingLetterIdx;
    } else {
        letters.push({ to, date, body });
    }
    saveLetters(letters);
    document.getElementById('sheet-content').innerHTML = buildLettersContent();
    const s = document.getElementById('letter-status');
    if (s) { s.textContent = '✓ Saved'; s.style.color='#F5C842'; }
};

window.editLetter = function(i) {
    const letters = loadLetters();
    const l = letters[i];
    window._editingLetterIdx = i;
    const toEl   = document.getElementById('letter-to');
    const dateEl = document.getElementById('letter-date');
    const bodyEl = document.getElementById('letter-body');
    if (toEl)   toEl.value   = l.to   || '';
    if (dateEl) dateEl.value = l.date || '';
    if (bodyEl) bodyEl.value = l.body || '';
    bodyEl?.scrollIntoView({ behavior: 'smooth', block: 'center' });
};

window.deleteLetter = function(i) {
    const letters = loadLetters();
    letters.splice(i, 1);
    saveLetters(letters);
    document.getElementById('sheet-content').innerHTML = buildLettersContent();
};

/* ── Heartbeat visual ──────────────────────────── */
function setHeartbeatBpm(bpm) {
    const hb = document.querySelector('.heartbeat');
    if (hb.dataset.bpm === String(bpm)) return;
    hb.dataset.bpm = String(bpm);
    document.querySelector('.heartbeat-line').style.animationDuration = `${120/bpm}s`;
}
setHeartbeatBpm(80);

function setupInteractiveHeartbeat() {
    const hb = document.querySelector('.heartbeat');
    let frame;
    document.addEventListener('pointermove', (e) => {
        cancelAnimationFrame(frame);
        frame = requestAnimationFrame(() => {
            const b = hb.getBoundingClientRect();
            const dist = Math.max(b.top - e.clientY, e.clientY - b.bottom, 0);
            const isNear = dist < 90;
            hb.style.setProperty('--cursor-x', `${Math.min(Math.max(e.clientX-b.left,0),b.width)}px`);
            hb.style.setProperty('--cursor-y', `${Math.min(Math.max(e.clientY-b.top,0),b.height)}px`);
            hb.style.setProperty('--heartbeat-opacity', isNear ? '.95' : '.72');
            hb.classList.toggle('is-interactive', isNear);
            setHeartbeatBpm(isNear ? 105 : 80);
        });
    });
    document.addEventListener('pointerleave', () => {
        document.querySelector('.heartbeat').classList.remove('is-interactive');
        document.querySelector('.heartbeat').style.setProperty('--heartbeat-opacity','.72');
        setHeartbeatBpm(80);
    });
}

/* ── Contract polling ──────────────────────────── */
async function pollContractStatus() {
    if (!contractReadOnly) return;
    try {
        const [balance, timeLeft, isReleased, inGrace] = await contractReadOnly.getStatus();
        const secs = Number(timeLeft);
        const bal  = ethers.formatEther(balance);
        const display    = document.querySelector('#timer-display');
        const stateLabel = document.querySelector('#timer-state');
        const dateLabel  = document.querySelector('#timer-date');
        const btn  = document.getElementById('mm-btn');
        const copy = document.getElementById('checkin-copy');
        document.body.classList.remove('state-warning','state-pending','state-released');
        if (isReleased) {
            document.body.classList.add('state-released');
            stateLabel.textContent = 'LEGACY RELEASED'; display.textContent = 'TRANSFER COMPLETE'; dateLabel.textContent = `${bal} POL -> Heir`;
            btn.textContent = 'RELEASED'; btn.disabled = true; clearInterval(pollInterval);
        } else if (inGrace) {
            document.body.classList.add('state-pending');
            stateLabel.textContent = 'HEARTBEAT EXPIRED'; display.textContent = 'TRANSFER PENDING'; dateLabel.textContent = 'Grace period active';
            const ownerAddr = await contractReadOnly.owner();
            if (userAddress && userAddress.toLowerCase() !== ownerAddr.toLowerCase()) {
                btn.textContent = 'RELEASE ASSETS'; btn.onclick = releaseAssets; btn.disabled = false; copy.textContent = 'Grace period - claim inheritance';
            }
        } else if (secs <= 5) {
            document.body.classList.add('state-warning');
            stateLabel.textContent = 'CHECK IN SOON'; display.textContent = `${secs} SEC LEFT`; dateLabel.textContent = `Resets in ${secs}s`;
        } else {
            stateLabel.textContent = `YOU'RE STILL WITH US`; display.textContent = `${secs} SEC LEFT`; dateLabel.textContent = `${bal} POL secured · Resets in ${secs}s`;
        }
    } catch(e) { console.error('poll error', e); }
}

async function confirmHeartbeat() {
    if (!contract) return;
    const btn = document.getElementById('mm-btn');
    const hbEl = document.querySelector('.heartbeat');
    try {
        btn.textContent = 'CONFIRMING...'; btn.disabled = true;
        const tx = await contract.heartbeat(); await tx.wait();
        hbEl.classList.remove('confirmed'); void hbEl.offsetWidth; hbEl.classList.add('confirmed');
        btn.textContent = 'HEARTBEAT CONFIRMED'; document.getElementById('checkin-copy').textContent = 'Resets in 60s';
        setTimeout(() => { btn.textContent = `I'M STILL HERE`; btn.disabled = false; document.getElementById('checkin-copy').textContent = 'Extend for another 60 seconds'; hbEl.classList.remove('confirmed'); }, 1800);
        pollContractStatus();
    } catch(e) { btn.textContent = `I'M STILL HERE`; btn.disabled = false; if(e.code!==4001) alert('트랜잭션 실패: '+(e.shortMessage||e.message)); }
}

async function releaseAssets() {
    if (!contract) return;
    const btn = document.getElementById('mm-btn');
    try {
        btn.textContent = 'RELEASING...'; btn.disabled = true;
        const tx = await contract.release(); await tx.wait(); pollContractStatus();
    } catch(e) { btn.textContent = 'RELEASE ASSETS'; btn.disabled = false; if(e.code!==4001) alert('트랜잭션 실패: '+(e.shortMessage||e.message)); }
}

async function setConnectedState(addr) {
    userAddress = addr;
    const btn  = document.getElementById('mm-btn');
    const copy = document.getElementById('checkin-copy');
    const provider  = new ethers.BrowserProvider(window.ethereum);
    const signerObj = await provider.getSigner();
    contract          = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signerObj);
    contractReadOnly  = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, provider);
    const ownerAddr   = await contractReadOnly.owner();
    const heirAddr    = await contractReadOnly.heir();
    const isOwner     = addr.toLowerCase() === ownerAddr.toLowerCase();
    const fmt         = a => `${a.slice(0,6)}...${a.slice(-4)}`;
    const [balance]   = await contractReadOnly.getStatus();
    const balPOL      = parseFloat(ethers.formatEther(balance)).toFixed(4);

    sheetData.assets.content = `
        <div class="sheet-row"><span>Owner wallet</span><strong>${fmt(ownerAddr)}</strong></div>
        <div class="sheet-row"><span>Contract balance</span><strong style="color:#F5C842">${balPOL} POL</strong></div>
        <div class="sheet-row"><span>Contract address</span><strong>${fmt(CONTRACT_ADDRESS)}</strong></div>
        <div class="sheet-row"><span>Network</span><strong>Polygon Amoy Testnet</strong></div>`;

    sheetData.beneficiaries = {
        title: 'Beneficiaries',
        content: buildBeneficiariesContent(heirAddr, balPOL)
    };
    sheetData.letters = {
        title: 'Letters',
        content: buildLettersContent()
    };

    document.querySelector('.timer-wrap').classList.add('visible');
    document.querySelector('.status-bar').style.cssText += 'opacity:1;visibility:visible;';
    btn.classList.remove('connected');

    if (isOwner) {
        btn.innerHTML = 'STARTING TIMER...'; btn.disabled = true; copy.textContent = 'Resetting timer...';
        try { const tx = await contract.heartbeat(); btn.innerHTML = 'CONFIRMING...'; await tx.wait(); } catch(e) {}
        btn.innerHTML = `I'M STILL HERE`; btn.onclick = confirmHeartbeat; btn.disabled = false; copy.textContent = 'Extend for another 60 seconds';
    } else {
        btn.innerHTML = `HEIR CONNECTED`; btn.disabled = true; copy.textContent = 'Waiting for heartbeat to expire...';
    }
    pollContractStatus();
    pollInterval = setInterval(pollContractStatus, 2000);
}

function setDisconnectedState() {
    clearInterval(pollInterval);
    const btn = document.getElementById('mm-btn');
    btn.innerHTML = connectButtonMarkup; btn.onclick = connectWallet; btn.disabled = false;
    document.getElementById('checkin-copy').textContent = 'MetaMask connection required';
}

/* ── Sheet open/close ──────────────────────────── */
function openSheet(type) {
    // Re-build dynamic sheets each time
    if (type === 'beneficiaries' && sheetData.beneficiaries) {
        // already built
    } else if (type === 'letters') {
        if (!sheetData.letters) sheetData.letters = { title: 'Letters', content: buildLettersContent() };
        sheetData.letters.content = buildLettersContent();
    }
    const d = sheetData[type];
    if (!d) return;
    document.getElementById('sheet-title').textContent   = d.title;
    document.getElementById('sheet-content').innerHTML   = d.content;
    const sheet = document.getElementById('bottom-sheet');
    sheet.classList.add('open'); sheet.setAttribute('aria-hidden','false');
    document.getElementById('sheet-close').focus();
}
function closeSheet() {
    const sheet = document.getElementById('bottom-sheet');
    sheet.classList.remove('open'); sheet.setAttribute('aria-hidden','true');
}

/* ── Connect wallet ────────────────────────────── */
async function connectWallet() {
    if (typeof window.ethereum !== 'undefined') {
        const btn = document.getElementById('mm-btn');
        btn.innerHTML = 'CONNECTING...'; btn.disabled = true;
        try {
            const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
            await setConnectedState(accounts[0]); btn.disabled = false;
        } catch(err) { setDisconnectedState(); if(err.code===4001) alert('연결을 취소했어요.'); }
    } else {
        document.getElementById('demo-modal-backdrop').classList.add('open');
    }
}

/* ── Init ──────────────────────────────────────── */
window.addEventListener('load', () => {
    setupInteractiveHeartbeat();
    document.querySelectorAll('[data-sheet]').forEach(b => b.addEventListener('click', () => openSheet(b.dataset.sheet)));
    document.getElementById('sheet-close').addEventListener('click', closeSheet);
    document.getElementById('bottom-sheet').addEventListener('click', e => { if(e.target.id==='bottom-sheet') closeSheet(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeSheet(); });
    if (window.ethereum) {
        window.ethereum.request({method:'eth_accounts'}).then(a => { if(a[0]) setConnectedState(a[0]); });
        window.ethereum.on('accountsChanged', a => { if(a[0]) setConnectedState(a[0]); else setDisconnectedState(); });
    }
});
</script>
